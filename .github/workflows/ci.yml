name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: "Test / Lint / Type-check"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy

      - name: Verify package installs (no required deps)
        run: pip install -e .

      # ------------------------------------------------------------------
      # Sanity-check that the init script runs without crashing
      # ------------------------------------------------------------------
      - name: Init check
        run: python init.py --check
        continue-on-error: true   # --check may not be implemented yet; don't block

      # ------------------------------------------------------------------
      # Unit tests
      # ------------------------------------------------------------------
      - name: Run pytest
        run: pytest tests/ -v --tb=short

      # ------------------------------------------------------------------
      # Linting (non-blocking on first pass — remove continue-on-error
      # once the codebase is clean)
      # ------------------------------------------------------------------
      - name: Ruff lint
        run: ruff check Pikaia/ --output-format=github
        continue-on-error: true

      # ------------------------------------------------------------------
      # Type checking (non-blocking — tighten gradually)
      # ------------------------------------------------------------------
      - name: Mypy
        run: mypy Pikaia/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
